<!DOCTYPE html>
<html lang="it" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}P&amp;ID Manager{% endblock %} - Lundbeck SOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --lundbeck-blue: #003865; --lundbeck-light: #e8f0fe; }
        .navbar { background-color: var(--lundbeck-blue) !important; }
        .card-header { background-color: var(--lundbeck-blue); color: white; }
        .btn-primary { background-color: var(--lundbeck-blue); border-color: var(--lundbeck-blue); }
        .btn-primary:hover { background-color: #004a8f; border-color: #004a8f; }
        .module-card { transition: transform 0.2s; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .module-card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .tag-result { font-family: 'Courier New', monospace; font-size: 1.3rem; font-weight: bold; }
        .status-ok { color: #198754; }
        .status-error { color: #dc3545; }
        .spinner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7); z-index: 9999; justify-content: center; align-items: center; }
        .spinner-overlay.active { display: flex; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-diagram-3"></i> P&amp;ID Manager
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/tags"><i class="bi bi-tag"></i> Genera Tag</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/verify"><i class="bi bi-check-circle"></i> Verifica P&amp;ID</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/extract"><i class="bi bi-file-earmark-text"></i> Estrai DXF</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/import"><i class="bi bi-upload"></i> Importa Tag</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/fluidi/page"><i class="bi bi-droplet-half"></i> Fluid List</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="spinner-overlay" id="spinner">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Caricamento...</span>
        </div>
    </div>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-3 border-top mt-4">
        <small>P&amp;ID Manager &mdash; Conforme SOP Lundbeck</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showSpinner() { document.getElementById('spinner').classList.add('active'); }
        function hideSpinner() { document.getElementById('spinner').classList.remove('active'); }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
