{% extends "base.html" %}
{% block title %}Fluid List{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-droplet-half"></i> Fluid List</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
      <i class="bi bi-plus-circle"></i> Aggiungi Custom
    </button>
  </div>

  <!-- Filters -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <input type="text" id="searchInput" class="form-control" placeholder="Cerca codice o descrizione...">
    </div>
    <div class="col-md-3">
      <select id="categoryFilter" class="form-select">
        <option value="">Tutte le categorie</option>
      </select>
    </div>
    <div class="col-md-3">
      <select id="sourceFilter" class="form-select">
        <option value="">Tutte le fonti</option>
        <option value="sop">SOP</option>
        <option value="dwg">DWG</option>
        <option value="custom">Custom</option>
      </select>
    </div>
    <div class="col-md-2 text-end">
      <span id="countBadge" class="badge bg-secondary fs-6">0 fluidi</span>
    </div>
  </div>

  <!-- Table -->
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle" id="fluidTable">
      <thead class="table-dark">
        <tr>
          <th>Codice</th>
          <th>Descrizione</th>
          <th>Categoria</th>
          <th>Materiale</th>
          <th>Rating</th>
          <th>Coibentazione</th>
          <th>Fonte</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="fluidBody"></tbody>
    </table>
  </div>
</div>

<!-- Add Custom Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Aggiungi fluido custom</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="addError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label class="form-label">Codice *</label>
          <input type="text" id="newCodice" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Descrizione *</label>
          <input type="text" id="newDescrizione" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Categoria *</label>
          <input type="text" id="newCategoria" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Materiale *</label>
          <input type="text" id="newMateriale" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Rating *</label>
          <input type="text" id="newRating" class="form-control" placeholder="es. PN16" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Coibentazione</label>
          <input type="text" id="newCoibentazione" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Nota</label>
          <input type="text" id="newNota" class="form-control">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
        <button type="button" class="btn btn-primary" id="btnSaveCustom">Salva</button>
      </div>
    </div>
  </div>
</div>

<script>
let allFluids = [];

function getSourceBadge(fluid) {
  if (fluid.custom) return '<span class="badge bg-info">Custom</span>';
  if (fluid.standard) return '<span class="badge bg-success">SOP</span>';
  return '<span class="badge bg-warning text-dark">DWG</span>';
}

function getSourceKey(fluid) {
  if (fluid.custom) return 'custom';
  if (fluid.standard) return 'sop';
  return 'dwg';
}

function renderTable(fluids) {
  const body = document.getElementById('fluidBody');
  body.innerHTML = fluids.map(f => `
    <tr>
      <td><code>${f.codice}</code></td>
      <td>${f.descrizione}${f.nota ? ' <i class="bi bi-info-circle text-muted" title="' + f.nota + '"></i>' : ''}</td>
      <td>${f.categoria}</td>
      <td>${f.materiale}</td>
      <td>${f.rating}</td>
      <td>${f.coibentazione || '—'}</td>
      <td>${getSourceBadge(f)}</td>
      <td>${f.custom ? '<button class="btn btn-sm btn-outline-danger" onclick="deleteCustom(\'' + f.codice + '\')"><i class="bi bi-trash"></i></button>' : ''}</td>
    </tr>
  `).join('');
  document.getElementById('countBadge').textContent = fluids.length + ' fluidi';
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  const src = document.getElementById('sourceFilter').value;

  const filtered = allFluids.filter(f => {
    if (search && !f.codice.toLowerCase().includes(search) && !f.descrizione.toLowerCase().includes(search)) return false;
    if (cat && f.categoria !== cat) return false;
    if (src && getSourceKey(f) !== src) return false;
    return true;
  });
  renderTable(filtered);
}

async function loadFluids() {
  const res = await fetch('/fluidi/');
  allFluids = await res.json();
  renderTable(allFluids);
}

async function loadCategories() {
  const res = await fetch('/fluidi/categorie');
  const cats = await res.json();
  const sel = document.getElementById('categoryFilter');
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
}

async function deleteCustom(codice) {
  if (!confirm(`Rimuovere il fluido custom "${codice}"?`)) return;
  const res = await fetch('/fluidi/custom/' + encodeURIComponent(codice), {method: 'DELETE'});
  if (res.ok) {
    await loadFluids();
    applyFilters();
  } else {
    const err = await res.json();
    alert(err.error || 'Errore durante la rimozione');
  }
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('categoryFilter').addEventListener('change', applyFilters);
document.getElementById('sourceFilter').addEventListener('change', applyFilters);

document.getElementById('btnSaveCustom').addEventListener('click', async () => {
  const errDiv = document.getElementById('addError');
  errDiv.classList.add('d-none');

  const payload = {
    codice: document.getElementById('newCodice').value.trim(),
    descrizione: document.getElementById('newDescrizione').value.trim(),
    categoria: document.getElementById('newCategoria').value.trim(),
    materiale: document.getElementById('newMateriale').value.trim(),
    rating: document.getElementById('newRating').value.trim(),
    coibentazione: document.getElementById('newCoibentazione').value.trim(),
    nota: document.getElementById('newNota').value.trim(),
  };

  const res = await fetch('/fluidi/custom', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload),
  });

  if (res.ok) {
    bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
    document.querySelectorAll('#addModal input').forEach(i => i.value = '');
    await loadFluids();
    await loadCategories();
    applyFilters();
  } else {
    const err = await res.json();
    errDiv.textContent = err.error || 'Errore durante il salvataggio';
    errDiv.classList.remove('d-none');
  }
});

loadFluids();
loadCategories();
</script>
{% endblock %}
